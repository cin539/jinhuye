<title>財運亨通539</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:40px;padding:48px 24px;
  background:#fdf6ec;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(220,60,20,.09) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(220,160,30,.12) 0%,transparent 60%);
}
.img-wrap{
  position:relative;
  width:min(280px,72vw);height:min(280px,72vw);
  filter:drop-shadow(0 16px 40px rgba(160,60,10,.28)) drop-shadow(0 4px 10px rgba(0,0,0,.1));
  animation:floatImg 4s ease-in-out infinite;
}
@keyframes floatImg{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.img-wrap img{width:100%;height:100%;border-radius:12%;display:block}
.ring{position:absolute;inset:-12px;border-radius:14%;border:1.5px solid rgba(200,80,20,.25);animation:spin 18s linear infinite}
.ring2{position:absolute;inset:-24px;border-radius:16%;border:1px solid rgba(212,150,30,.15);animation:spin 28s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-wrap{animation:floatBtn 4s ease-in-out infinite;animation-delay:.6s}
@keyframes floatBtn{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.line-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:#06C755;color:#fff;text-decoration:none;
  padding:15px 38px;border-radius:50px;
  font-size:17px;font-weight:700;letter-spacing:.05em;
  font-family:system-ui,-apple-system,sans-serif;
  box-shadow:0 8px 28px rgba(6,199,85,.35),0 2px 6px rgba(6,199,85,.2);
  transition:filter .15s,box-shadow .15s;
}
.line-btn:hover{filter:brightness(1.07);box-shadow:0 12px 36px rgba(6,199,85,.45)}
.line-btn:active{transform:scale(.97)}
.icon{width:26px;height:26px;flex-shrink:0}
</style>
